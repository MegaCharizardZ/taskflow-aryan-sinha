spring:
  application:
    name: taskflow
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:taskflow_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
#      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
#    baseline-on-migrate: true

app:
  debug: hello-world
  jwt:
    # HS256 requires at least 256 bits (32 UTF-8 bytes). Override in production via JWT_SECRET.
    secret: ${JWT_SECRET:dev-only-change-me-use-32-byte-secret-key!}
    expiration-ms: 86400000
