spring:
  application:
    name: taskflow-aryan-sinha
  datasource:
    url: jdbc:postgresql://localhost:5432/taskflow_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    # HS256 requires at least 256 bits (32 UTF-8 bytes). Override in production via JWT_SECRET.
    secret: ${JWT_SECRET:dev-only-change-me-use-32-byte-secret-key!}
    expiration-ms: 86400000
